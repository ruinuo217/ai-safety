<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG Knowledge Bot | Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#000;--s:rgba(255,255,255,0.04);--b:rgba(255,255,255,0.07);--t1:rgba(255,255,255,0.92);--t2:rgba(255,255,255,0.55);--t3:rgba(255,255,255,0.3);--accent:#2997ff;--green:#30d158;--r:16px;--font:"SF Pro Display",-apple-system,"Segoe UI","Microsoft JhengHei",sans-serif;}
body{font-family:var(--font);background:var(--bg);color:var(--t1);height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;}

nav{background:rgba(0,0,0,0.72);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;}
nav .inner{max-width:800px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
nav .logo{font-size:15px;font-weight:600;}
nav .sub{font-size:12px;color:var(--t3);}
nav .back{font-size:13px;color:var(--accent);text-decoration:none;}

.quick-bar{padding:10px 20px;border-bottom:1px solid rgba(255,255,255,0.04);display:flex;gap:8px;overflow-x:auto;flex-shrink:0;}
.quick-bar::-webkit-scrollbar{height:0;}
.quick-btn{padding:7px 16px;background:var(--s);border:1px solid var(--b);border-radius:980px;font-size:13px;color:var(--t2);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.quick-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}

.chat-area{flex:1;overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;max-width:800px;width:100%;margin:0 auto;}

.welcome{text-align:center;padding:60px 20px;}
.welcome .icon{font-size:48px;margin-bottom:12px;}
.welcome h2{font-size:22px;margin-bottom:6px;}
.welcome p{font-size:14px;color:var(--t3);}

.msg{max-width:80%;padding:14px 18px;border-radius:18px;line-height:1.7;font-size:15px;animation:fadeIn 0.3s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.msg.bot{align-self:flex-start;background:var(--s);border:1px solid var(--b);border-bottom-left-radius:4px;}
.msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px;}
.ref-section{margin-top:12px;padding-top:10px;border-top:1px solid rgba(255,255,255,0.06);}
.ref-title{font-size:11px;color:var(--t3);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.05em;}
.ref-item{font-size:13px;color:var(--t2);padding:8px 12px;margin-top:4px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid var(--accent);}

.typing{align-self:flex-start;color:var(--t3);font-size:14px;display:none;align-items:center;gap:6px;}
.typing .dot{width:6px;height:6px;background:var(--t3);border-radius:50%;animation:bounce 1.4s infinite ease-in-out;}
.typing .dot:nth-child(2){animation-delay:0.2s;}
.typing .dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,80%,100%{transform:scale(0);}40%{transform:scale(1);}}

.input-area{padding:16px 20px;border-top:1px solid rgba(255,255,255,0.06);display:flex;gap:10px;max-width:800px;width:100%;margin:0 auto;flex-shrink:0;}
.input-area input{flex:1;padding:12px 18px;border:1.5px solid rgba(255,255,255,0.1);border-radius:980px;font-size:15px;background:var(--s);color:var(--t1);outline:none;transition:border-color 0.2s;}
.input-area input:focus{border-color:var(--accent);}
.input-area input::placeholder{color:var(--t3);}
.input-area button{padding:12px 24px;background:var(--accent);color:#fff;border:none;border-radius:980px;font-size:15px;cursor:pointer;font-weight:500;transition:all 0.2s;}
.input-area button:hover{filter:brightness(1.15);}

.powered{text-align:center;padding:8px;font-size:11px;color:rgba(255,255,255,0.15);flex-shrink:0;}
</style>
</head>
<body>

<nav><div class="inner"><div><span class="logo">RAG Knowledge Bot</span><br><span class="sub">Powered by Gemini + RAG</span></div><a class="back" href="../index.html">&larr; Portfolio</a></div></nav>

<div class="quick-bar">
  <div class="quick-btn" onclick="ask(this)">退貨政策是什麼？</div>
  <div class="quick-btn" onclick="ask(this)">怎麼聯絡客服？</div>
  <div class="quick-btn" onclick="ask(this)">付款方式有哪些？</div>
  <div class="quick-btn" onclick="ask(this)">運費怎麼算？</div>
  <div class="quick-btn" onclick="ask(this)">會員有什麼福利？</div>
  <div class="quick-btn" onclick="ask(this)">訂單可以修改嗎？</div>
  <div class="quick-btn" onclick="ask(this)">商品保固多久？</div>
</div>

<div class="chat-area" id="chatArea">
  <div class="welcome" id="welcome">
    <div class="icon">💬</div>
    <h2>AI Customer Service</h2>
    <p>Click a quick question above or type your own below</p>
  </div>
  <div class="typing" id="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span>&nbsp;Searching knowledge base...</div>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="Ask a question..." onkeydown="if(event.key==='Enter')send()">
  <button onclick="send()">Send</button>
</div>
<div class="powered">RAG + Gemini Embedding + Cosine Similarity</div>

<script>
var answers = {
  "退貨政策是什麼？": {a:"根據我們的退貨政策，商品在收到後 7 天內可申請退貨，需保持商品完整包裝。生鮮食品及個人衛生用品不適用退貨。退款將在收到退回商品後 3-5 個工作天內處理。",s:["Q: 退貨政策是什麼？\nA: 商品收到後7天內可退貨，需保持完整包裝...","Q: 退款多久到帳？\nA: 收到退回商品後3-5個工作天..."]},
  "怎麼聯絡客服？": {a:"您可以透過以下方式聯絡客服：\n1. 線上客服：週一至週五 9:00-18:00\n2. 客服信箱：support@example.com\n3. 客服專線：02-1234-5678\n\n週末及假日僅提供信箱服務，將於下個工作日回覆。",s:["Q: 客服聯絡方式？\nA: 線上客服、信箱、電話三種管道..."]},
  "付款方式有哪些？": {a:"目前支援以下付款方式：\n• 信用卡（Visa / Mastercard / JCB）\n• ATM 轉帳\n• 超商代碼繳費\n• LINE Pay\n• Apple Pay\n\n信用卡支援分期付款（3/6/12期），滿 $3,000 即可使用。",s:["Q: 付款方式？\nA: 信用卡、ATM、超商代碼、LINE Pay、Apple Pay..."]},
  "運費怎麼算？": {a:"運費計算方式如下：\n• 一般宅配：$80（滿 $1,500 免運）\n• 超商取貨：$60（滿 $1,000 免運）\n• 離島地區：加收 $50\n\n大型商品（如家具）另計運費，會在商品頁標示。",s:["Q: 運費標準？\nA: 宅配$80、超商$60，滿額免運..."]},
  "會員有什麼福利？": {a:"會員專屬福利包含：\n• 註冊即贈 100 點購物金\n• 生日當月 9 折優惠\n• 會員專屬促銷活動\n• 累積消費升等（銀/金/鑽石）\n• 鑽石會員享免運及優先出貨",s:["Q: 會員福利？\nA: 購物金、生日優惠、專屬活動、會員升等..."]},
  "訂單可以修改嗎？": {a:"訂單送出後，在「準備出貨」狀態前可修改地址及數量。若已進入出貨流程則無法修改，建議收到商品後申請退換貨。\n\n修改方式：登入會員 → 我的訂單 → 點擊「修改」按鈕。",s:["Q: 訂單修改？\nA: 出貨前可修改，出貨後需走退換貨流程..."]},
  "商品保固多久？": {a:"保固期間依商品類別而異：\n• 3C 電子產品：1 年原廠保固\n• 家電產品：2 年保固\n• 配件週邊：6 個月保固\n\n保固期內非人為損壞可免費維修或更換，需保留購買證明。",s:["Q: 保固期多長？\nA: 3C一年、家電兩年、配件六個月..."]}
};

function addMsg(text, type, sources) {
  document.getElementById('welcome').style.display='none';
  var d = document.createElement('div');
  d.className = 'msg ' + type;
  var html = text.replace(/\n/g,'<br>');
  if (sources && sources.length) {
    html += '<div class="ref-section"><div class="ref-title">References</div>';
    sources.forEach(function(s) { html += '<div class="ref-item">' + s.split('\n')[0] + '</div>'; });
    html += '</div>';
  }
  d.innerHTML = html;
  var area = document.getElementById('chatArea');
  area.insertBefore(d, document.getElementById('typing'));
  area.scrollTop = area.scrollHeight;
}

function ask(el) { document.getElementById('input').value = el.textContent; send(); }

function send() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  addMsg(text, 'user');
  input.value = '';
  var typing = document.getElementById('typing');
  typing.style.display = 'flex';
  var ans = answers[text];
  setTimeout(function() {
    typing.style.display = 'none';
    if (ans) { addMsg(ans.a, 'bot', ans.s); }
    else { addMsg('根據知識庫搜尋結果，目前沒有找到與「' + text + '」完全匹配的資料。建議您嘗試上方的快速問題，或聯繫人工客服。', 'bot'); }
  }, 800 + Math.random() * 600);
}
</script>
</body>
</html>
